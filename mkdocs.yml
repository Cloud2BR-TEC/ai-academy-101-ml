site_name: "AI Academy - Machine Learning 101"
site_description: Foundational Azure Machine Learning training for AI Academy Level 101.
site_url: https://cloud2br-tec.github.io/ai-academy-101-ml/
copyright: Copyright &copy; 2026 <a href="https://github.com/Cloud2BR-TEC" target="_blank" rel="noopener">Cloud2BR TEC</a>

theme:
  name: material
  language: en
  logo: assets/img/org-logo.png
  favicon: assets/img/org-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: blue
    accent: blue

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - assets/js/mermaid-init.js
  - assets/js/org-link.js

extra_css:
  - assets/css/custom.css

extra:
  generator: false

nav:
  - Home: index.md
  - 01. Program Levels: modules/01-math-prerequisites.md
  - 02. Azure ML Overview: modules/02-e2e-overview.md
  - 03. Workspace and Authoring: modules/03-introduction.md
  - 04. Assets and Lifecycle: modules/04-ml-foundations.md
  - 05. Build Your First Model: modules/05-neural-networks.md
  - 06. Deploy and Score: modules/06-azure-ml-environment.md
  - 07. Terraform Foundations: modules/07-environment-setup.md
  - 08. Fabric and AI Integration: modules/08-data-preparation.md
  - 09. Path to Levels 102 and 103: modules/09-model-types.md
  - Reference:
      - Overview: reference/index.md
      - CLI Commands: reference/cli-commands.md
      - Glossary: reference/glossary.md
