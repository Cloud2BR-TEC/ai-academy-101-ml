site_name: "Machine Learning 101"
site_description: Foundational Azure Machine Learning training.
site_url: https://cloud2br-tec.github.io/ai-academy-101-ml/
docs_dir: docs/i18n
copyright: Copyright &copy; 2026 <a href="https://github.com/Cloud2BR-TEC" target="_blank" rel="noopener">Cloud2BR TEC</a>

theme:
  name: material
  language: en
  logo: assets/img/org-logo.png
  favicon: assets/img/org-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: blue
    accent: blue

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: "Español"
          build: true
          nav_translations:
            Home: Inicio
            01. Machine Learning Basics: "01. Fundamentos de aprendizaje automático"
            02. Azure ML Overview: "02. Descripción general de Azure ML"
            03. Workspace and Authoring: "03. Workspace y autoría"
            04. Assets and Lifecycle: "04. Activos y ciclo de vida"
            05. Build Your First Model: "05. Construye tu primer modelo"
            06. Deploy and Score: "06. Desplegar y puntuar"
            07. Terraform Foundations: "07. Fundamentos de Terraform"
            08. Fabric and AI Integration: "08. Integración de Fabric e IA"
            09. Wrap-Up and Next Steps: "09. Cierre y próximos pasos"
            Reference: Referencia
            Visual Library: Biblioteca visual
            CLI Commands: Comandos de CLI
            Glossary: Glosario

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - assets/js/mermaid-init.js
  - assets/js/org-link.js

extra_css:
  - assets/css/custom.css

extra:
  generator: false

nav:
  - Home: index.md
  - 01. Machine Learning Basics: modules/01-machine-learning-basics.md
  - 02. Azure ML Overview: modules/02-azure-ml-overview.md
  - 03. Workspace and Authoring: modules/03-workspace-and-authoring.md
  - 04. Assets and Lifecycle: modules/04-assets-and-lifecycle.md
  - 05. Build Your First Model: modules/05-build-your-first-model.md
  - 06. Deploy and Score: modules/06-deploy-and-score.md
  - 07. Terraform Foundations: modules/07-terraform-foundations.md
  - 08. Fabric and AI Integration: modules/08-fabric-and-ai-integration.md
  - 09. Wrap-Up and Next Steps: modules/09-wrap-up-and-next-steps.md
  - Reference:
      - Visual Library: reference/visual-library.md
      - CLI Commands: reference/cli-commands.md
      - Glossary: reference/glossary.md
