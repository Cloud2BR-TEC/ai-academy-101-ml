version: 1
name: machine-learning-101-repo-agenda-es
language: es
scope: backend-only
published_in_docs: false
owner: Cloud2BR TEC
updated: 2026-07-13

meeting:
  title: Machine Learning 101 - Agenda de Sesión
  audience: Personas que se unen a la reunión (niveles técnicos mixtos)
  total_duration_minutes: 60
  objective: Alinear al equipo en conceptos clave de ML, flujo de trabajo y siguientes acciones prácticas.

timing_model:
  explain_minutes: 36
  participant_share_minutes: 18
  transition_minutes: 6
  explain_percentage: 60
  participant_share_percentage: 30
  transition_percentage: 10

meeting_agenda:
  - duration: 5 min
    segment: Bienvenida y objetivos de la sesión
    explain: Presentar el propósito, resultados esperados y dinámica.
    participant_share: Presentaciones rápidas y expectativas.
  - duration: 10 min
    segment: Fundamentos de ML en lenguaje simple
    explain: Explicar qué es ML, términos clave y tipos comunes.
    participant_share: Compartir un caso de negocio o escuela donde ML ayude.
  - duration: 10 min
    segment: Resumen del flujo de extremo a extremo
    explain: Recorrer datos, entrenamiento, evaluación, despliegue y monitoreo.
    participant_share: Relacionar el flujo con proyectos actuales.
  - duration: 10 min
    segment: Enfoque de plataforma (Azure ML y Fabric)
    explain: Aclarar dónde encajan Azure ML y Fabric en el flujo.
    participant_share: Compartir familiaridad con herramientas y bloqueos.
  - duration: 10 min
    segment: Preguntas y respuestas
    explain: Responder dudas de principiantes con ejemplos simples.
    participant_share: Espacio abierto para preguntas y ejemplos.
  - duration: 10 min
    segment: Plan de acción
    explain: Proponer siguientes pasos prácticos y rutas de aprendizaje.
    participant_share: Confirmar la primera acción de cada asistente.
  - duration: 5 min
    segment: Cierre
    explain: Resumir puntos clave y acciones de seguimiento.
    participant_share: Comentarios finales y nivel de confianza.

facilitation_notes:
  - Mantener explicaciones para nivel principiante (equivalente a grados 10-12).
  - Usar analogías de ingeniería de software para conceptos del ciclo ML.
  - Pausar cada 10 minutos para confirmar comprensión.
  - Registrar preguntas para seguimiento posterior.

pre_read_to_share:
  - README.md
  - docs/i18n/en/index.md
  - docs/i18n/es/index.md

outputs_to_share_after_meeting:
  - Resumen de sesión con preguntas respondidas.
  - Enlaces a los módulos revisados.
  - Orden recomendado de aprendizaje para siguientes pasos.
