<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400" role="img" aria-labelledby="title">
  <title id="title">Features and Target Explained</title>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
      .feature-box { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.8; }
      .target-box { fill: #fef9c3; stroke: #fbbf24; stroke-width: 2.5; }
      .model-box { fill: #f0fdf4; stroke: #6ee7b7; stroke-width: 1.8; }
      .h1 { font-family: Segoe UI, Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #0f172a; }
      .h2 { font-family: Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #1e40af; }
      .h2t { font-family: Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #b45309; }
      .body { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #334155; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 12.5px; fill: #475569; }
      .tag { font-family: Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #ffffff; }
      .tag-f { fill: #2563eb; rx: 4; }
      .tag-t { fill: #d97706; rx: 4; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrft); }
    </style>
    <marker id="arrft" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#64748b" points="0 0, 9 3.5, 0 7"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1000" height="400"/>

  <!-- Title -->
  <text class="h1" x="500" y="46" text-anchor="middle">Features and Target</text>
  <text class="body" x="500" y="70" text-anchor="middle">Features are the pieces of information you give the model. The target is the answer you want it to predict.</text>

  <!-- Features column -->
  <rect class="feature-box" x="30" y="90" width="360" height="290" rx="12"/>
  <rect class="tag-f" x="30" y="90" width="360" height="38" rx="12"/>
  <text class="h2" x="210" y="115" text-anchor="middle" fill="white">Features (Inputs)</text>
  <text class="small" x="50" y="150">Each row below is one piece of information about a person:</text>
  <text class="body" x="60" y="178">Age: 16</text>
  <text class="body" x="60" y="200">Hours studied per week: 8</text>
  <text class="body" x="60" y="222">Homework completion rate: 90%</text>
  <text class="body" x="60" y="244">Days attended: 18 out of 20</text>
  <text class="body" x="60" y="266">Previous test score: 74</text>
  <text class="small" x="50" y="298">These are the facts the model is allowed to use</text>
  <text class="small" x="50" y="316">when making a prediction. The more relevant</text>
  <text class="small" x="50" y="334">features you include, the better the model can learn.</text>

  <!-- Arrow -->
  <line class="arrow" x1="394" y1="235" x2="472" y2="235"/>

  <!-- Model box -->
  <rect class="model-box" x="474" y="190" width="110" height="90" rx="12"/>
  <text class="body" x="529" y="230" text-anchor="middle" font-weight="700">Model</text>
  <text class="small" x="529" y="253" text-anchor="middle">(learned</text>
  <text class="small" x="529" y="268" text-anchor="middle">pattern)</text>

  <!-- Arrow to target -->
  <line class="arrow" x1="586" y1="235" x2="602" y2="235"/>

  <!-- Target column -->
  <rect class="target-box" x="604" y="90" width="366" height="290" rx="12"/>
  <rect class="tag-t" x="604" y="90" width="366" height="38" rx="12"/>
  <text class="h2t" x="787" y="115" text-anchor="middle" fill="white">Target (Output to Predict)</text>
  <text class="small" x="624" y="150">This is the value the model is trying to predict:</text>
  <text class="body" x="634" y="180">Final exam result: Pass or Fail</text>
  <text class="small" x="624" y="215">The target is not used during prediction.</text>
  <text class="small" x="624" y="235">During training, it shows the model what</text>
  <text class="small" x="624" y="255">the correct answer should have been,</text>
  <text class="small" x="624" y="275">so the model can adjust and improve.</text>
  <text class="small" x="624" y="310">For new data, the target is unknown.</text>
  <text class="small" x="624" y="330">The model predicts it from the features.</text>
</svg>
