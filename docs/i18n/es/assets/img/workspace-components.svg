<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="380" viewBox="0 0 1100 380" role="img" aria-labelledby="title">
  <title id="title">Componentes del Workspace de Azure ML</title>
  <defs>
    <style>
      .bg { fill: #f0f4ff; }
      .workspace { fill: #ffffff; stroke: #3b82f6; stroke-width: 2.5; }
      .comp { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; }
      .comp2 { fill: #f0fdf4; stroke: #6ee7b7; stroke-width: 1.5; }
      .comp3 { fill: #fef9c3; stroke: #fcd34d; stroke-width: 1.5; }
      .comp4 { fill: #fdf4ff; stroke: #d8b4fe; stroke-width: 1.5; }
      .comp5 { fill: #fff1f2; stroke: #fca5a5; stroke-width: 1.5; }
      .h1 { font-family: Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #1e3a8a; }
      .h2 { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #1e293b; }
      .body { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; fill: #475569; }
      .ws-label { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #3b82f6; letter-spacing: 0.05em; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="380"/>

  <!-- Workspace container -->
  <rect class="workspace" x="30" y="50" width="1040" height="300" rx="16"/>
  <text class="ws-label" x="550" y="38" text-anchor="middle">WORKSPACE DE AZURE MACHINE LEARNING</text>
  <text class="body" x="550" y="80" text-anchor="middle">Todo en tu proyecto de ML vive dentro de un workspace.</text>

  <!-- Data -->
  <rect class="comp" x="60" y="100" width="180" height="100" rx="10"/>
  <text class="h2" x="150" y="126" text-anchor="middle" fill="#1e40af">Data Assets</text>
  <text class="body" x="75" y="150">Your datasets, stored</text>
  <text class="body" x="75" y="168">with version tracking.</text>
  <text class="body" x="75" y="186">Reusable across jobs.</text>

  <!-- Compute -->
  <rect class="comp2" x="260" y="100" width="180" height="100" rx="10"/>
  <text class="h2" x="350" y="126" text-anchor="middle" fill="#166534">Compute</text>
  <text class="body" x="275" y="150">Machines that run</text>
  <text class="body" x="275" y="168">your training and</text>
  <text class="body" x="275" y="186">prediction jobs.</text>

  <!-- Jobs/Experiments -->
  <rect class="comp3" x="460" y="100" width="180" height="100" rx="10"/>
  <text class="h2" x="550" y="126" text-anchor="middle" fill="#92400e">Jobs</text>
  <text class="body" x="475" y="150">One execution of your</text>
  <text class="body" x="475" y="168">code. Logs metrics</text>
  <text class="body" x="475" y="186">and outputs.</text>

  <!-- Models -->
  <rect class="comp4" x="660" y="100" width="180" height="100" rx="10"/>
  <text class="h2" x="750" y="126" text-anchor="middle" fill="#6b21a8">Model Registry</text>
  <text class="body" x="675" y="150">Trained models saved</text>
  <text class="body" x="675" y="168">and versioned. Ready</text>
  <text class="body" x="675" y="186">to deploy anytime.</text>

  <!-- Endpoints -->
  <rect class="comp5" x="860" y="100" width="180" height="100" rx="10"/>
  <text class="h2" x="950" y="126" text-anchor="middle" fill="#9f1239">Endpoints</text>
  <text class="body" x="875" y="150">Deployed models that</text>
  <text class="body" x="875" y="168">accept prediction</text>
  <text class="body" x="875" y="186">requests via URL.</text>

  <!-- Flow arrows -->
  <defs>
    <marker id="arrw" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon fill="#94a3b8" points="0 0, 8 3.5, 0 7"/>
    </marker>
  </defs>
  <line stroke="#94a3b8" stroke-width="2" marker-end="url(#arrw)" x1="242" y1="150" x2="258" y2="150"/>
  <line stroke="#94a3b8" stroke-width="2" marker-end="url(#arrw)" x1="442" y1="150" x2="458" y2="150"/>
  <line stroke="#94a3b8" stroke-width="2" marker-end="url(#arrw)" x1="642" y1="150" x2="658" y2="150"/>
  <line stroke="#94a3b8" stroke-width="2" marker-end="url(#arrw)" x1="842" y1="150" x2="858" y2="150"/>

  <!-- Environments row -->
  <text class="body" x="550" y="230" text-anchor="middle">Cada job corre en un Environment con paquetes definidos para reproducibilidad.</text>
  <rect class="workspace" x="100" y="248" width="900" height="78" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text class="h2" x="550" y="272" text-anchor="middle" fill="#475569">Environments (Compartidos por Data, Jobs, Models y Endpoints)</text>
  <text class="body" x="550" y="296" text-anchor="middle">Paquetes Python • Imagen Docker • Dependencias de runtime</text>
  <text class="body" x="550" y="314" text-anchor="middle">Definido una vez -> reutilizado para asegurar consistencia</text>
</svg>
