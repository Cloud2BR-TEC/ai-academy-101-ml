<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="440" viewBox="0 0 1100 440" role="img" aria-labelledby="title">
  <title id="title">Tres tipos de aprendizaje automático</title>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card-s { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; }
      .card-u { fill: #f0fdf4; stroke: #6ee7b7; stroke-width: 2; }
      .card-r { fill: #fdf4ff; stroke: #d8b4fe; stroke-width: 2; }
      .bar-s { fill: #3b82f6; }
      .bar-u { fill: #22c55e; }
      .bar-r { fill: #a855f7; }
      .h1 { font-family: Segoe UI, Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #0f172a; }
      .h2 { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .body { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #334155; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; fill: #475569; }
      .example-box { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="440"/>
  <text class="h1" x="550" y="44" text-anchor="middle">Tres tipos de aprendizaje automático</text>

  <!-- Supervised -->
  <rect class="card-s" x="30" y="70" width="330" height="350" rx="14"/>
  <rect class="bar-s" x="30" y="70" width="330" height="44" rx="14"/>
  <text class="h2" x="195" y="100" text-anchor="middle" fill="white">Aprendizaje Supervisado</text>
  <text class="body" x="55" y="140">Los datos de entrenamiento tienen respuestas correctas.</text>
  <text class="body" x="55" y="162">El modelo aprende a partir de ejemplos etiquetados.</text>
  <rect class="example-box" x="50" y="180" width="290" height="120" rx="8"/>
  <text class="small" x="70" y="206">Ejemplo: detección de correo spam.</text>
  <text class="small" x="70" y="228">Cada correo de entrenamiento está etiquetado:</text>
  <text class="small" x="70" y="250"> "spam" o "no spam"</text>
  <text class="small" x="70" y="272">El modelo aprende qué patrones</text>
  <text class="small" x="70" y="290">están asociados con spam.</text>
  <text class="body" x="55" y="330">Tareas comunes:</text>
  <text class="small" x="70" y="352">• Clasificación (spam / no spam)</text>
  <text class="small" x="70" y="374">• Regresión (predecir un número)</text>

  <!-- Unsupervised -->
  <rect class="card-u" x="385" y="70" width="330" height="350" rx="14"/>
  <rect class="bar-u" x="385" y="70" width="330" height="44" rx="14"/>
  <text class="h2" x="550" y="100" text-anchor="middle" fill="white">Aprendizaje No Supervisado</text>
  <text class="body" x="410" y="140">Los datos de entrenamiento no tienen respuestas correctas.</text>
  <text class="body" x="410" y="162">El modelo descubre estructura por sí mismo.</text>
  <rect class="example-box" x="405" y="180" width="290" height="120" rx="8"/>
  <text class="small" x="425" y="206">Ejemplo: agrupación de clientes.</text>
  <text class="small" x="425" y="228">Con historiales de compra sin etiquetas,</text>
  <text class="small" x="425" y="250">el modelo encuentra grupos naturales como:</text>
  <text class="small" x="425" y="272"> "compradores frecuentes" o "compradores ocasionales".</text>
  <text class="small" x="425" y="290">Nadie le indicó cuáles debían ser los grupos.</text>
  <text class="body" x="410" y="330">Tareas comunes:</text>
  <text class="small" x="425" y="352">• Agrupamiento (encontrar grupos)</text>
  <text class="small" x="425" y="374">• Reducción de dimensionalidad</text>

  <!-- Reinforcement -->
  <rect class="card-r" x="740" y="70" width="330" height="350" rx="14"/>
  <rect class="bar-r" x="740" y="70" width="330" height="44" rx="14"/>
  <text class="h2" x="905" y="100" text-anchor="middle" fill="white">Aprendizaje por Refuerzo</text>
  <text class="body" x="765" y="140">Un agente aprende tomando acciones</text>
  <text class="body" x="765" y="162">y recibe recompensas o penalizaciones.</text>
  <rect class="example-box" x="760" y="180" width="290" height="120" rx="8"/>
  <text class="small" x="780" y="206">Ejemplo: IA para jugar juegos.</text>
  <text class="small" x="780" y="228">El agente prueba movimientos en un juego.</text>
  <text class="small" x="780" y="250">Cada buen movimiento gana una recompensa.</text>
  <text class="small" x="780" y="272">Cada mal movimiento recibe una penalización.</text>
  <text class="small" x="780" y="290">Con el tiempo, aprende la mejor estrategia.</text>
  <text class="body" x="765" y="330">Tareas comunes:</text>
  <text class="small" x="780" y="352">• Estrategia de juego</text>
  <text class="small" x="780" y="374">• Robótica y sistemas de control</text>
</svg>
