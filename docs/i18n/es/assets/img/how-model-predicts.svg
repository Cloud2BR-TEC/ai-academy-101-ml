<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="340" viewBox="0 0 1100 340" role="img" aria-labelledby="title">
  <title id="title">Cómo un modelo de ML hace una predicción</title>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box-in { fill: #dbeafe; stroke: #93c5fd; stroke-width: 1.8; }
      .box-model { fill: #fef9c3; stroke: #fcd34d; stroke-width: 2; }
      .box-out { fill: #dcfce7; stroke: #6ee7b7; stroke-width: 1.8; }
      .box-entrenar { fill: #f3e8ff; stroke: #d8b4fe; stroke-width: 1.8; }
      .h1 { font-family: Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
      .h2 { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #1e293b; }
      .body { font-family: Segoe UI, Arial, sans-serif; font-size: 13.5px; fill: #334155; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 12.5px; fill: #64748b; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrp); }
      .arrow-entrenar { stroke: #a78bfa; stroke-width: 2; fill: none; marker-end: url(#arrpt); stroke-dasharray: 6 4; }
      .phase-label { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #64748b; letter-spacing: 0.06em; }
    </style>
    <marker id="arrp" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#475569" points="0 0, 9 3.5, 0 7"/>
    </marker>
    <marker id="arrpt" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#a78bfa" points="0 0, 9 3.5, 0 7"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="340"/>
  <text class="h1" x="550" y="42" text-anchor="middle">Cómo un modelo de ML hace una predicción</text>

  <!-- Entrenaring phase -->
  <text class="phase-label" x="30" y="82" text-transform="uppercase">FASE DE ENTRENAMIENTO</text>

  <!-- Entrenaring data box -->
  <rect class="box-entrenar" x="30" y="92" width="210" height="100" rx="10"/>
  <text class="h2" x="135" y="117" text-anchor="middle" fill="#6d28d9">Datos de Entrenamiento</text>
  <text class="body" x="50" y="142">Ejemplos etiquetados:</text>
  <text class="small" x="50" y="162">entrada + respuesta correcta conocida</text>
  <text class="small" x="50" y="178">→ miles de filas</text>

  <line class="arrow-entrenar" x1="240" y1="142" x2="298" y2="142"/>

  <!-- Algorithm box -->
  <rect class="box-model" x="300" y="92" width="180" height="100" rx="10"/>
  <text class="h2" x="390" y="117" text-anchor="middle" fill="#92400e">Algoritmo de Aprendizaje</text>
  <text class="small" x="320" y="145">Ajusta pesos internos</text>
  <text class="small" x="320" y="163">para reducir errores de predicción</text>
  <text class="small" x="320" y="180">en todos los ejemplos</text>

  <line class="arrow-entrenar" x1="480" y1="142" x2="538" y2="142"/>

  <!-- Entrenared model box -->
  <rect class="box-model" x="540" y="92" width="160" height="100" rx="10"/>
  <text class="h2" x="620" y="117" text-anchor="middle" fill="#92400e">Modelo Entrenado</text>
  <text class="small" x="558" y="145">Patrón aprendido almacenado</text>
  <text class="small" x="558" y="163">como una función</text>
  <text class="small" x="558" y="180">matemática</text>

  <!-- Prediction phase -->
  <text class="phase-label" x="30" y="240" text-transform="uppercase">FASE DE PREDICCION</text>

  <!-- New input box -->
  <rect class="box-in" x="30" y="252" width="200" height="72" rx="10"/>
  <text class="h2" x="130" y="275" text-anchor="middle" fill="#1e40af">Nueva Entrada</text>
  <text class="small" x="50" y="296">Datos no vistos sin</text>
  <text class="small" x="50" y="312">una respuesta conocida</text>

  <line class="arrow" x1="230" y1="288" x2="540" y2="235"/>

  <!-- Model receives new input -->
  <rect class="box-model" x="540" y="204" width="160" height="62" rx="10"/>
  <text class="h2" x="620" y="227" text-anchor="middle" fill="#92400e">Modelo Entrenado</text>
  <text class="small" x="558" y="252">Aplica el patrón aprendido</text>

  <line class="arrow" x1="700" y1="235" x2="800" y2="235"/>

  <!-- Prediction box -->
  <rect class="box-out" x="802" y="200" width="260" height="96" rx="10"/>
  <text class="h2" x="932" y="226" text-anchor="middle" fill="#166534">Predicción</text>
  <text class="body" x="822" y="252">la respuesta del modelo para</text>
  <text class="body" x="822" y="272">la nueva entrada</text>
  <text class="small" x="822" y="290">p. ej. "Spam" o precio = $320</text>
</svg>
