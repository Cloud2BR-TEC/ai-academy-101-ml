<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400" role="img" aria-labelledby="title">
  <title id="title">Explicación de características y variable objetivo</title>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
      .feature-box { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.8; }
      .target-box { fill: #fef9c3; stroke: #fbbf24; stroke-width: 2.5; }
      .model-box { fill: #f0fdf4; stroke: #6ee7b7; stroke-width: 1.8; }
      .h1 { font-family: Segoe UI, Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #0f172a; }
      .h2 { font-family: Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #1e40af; }
      .h2t { font-family: Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #b45309; }
      .body { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #334155; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 12.5px; fill: #475569; }
      .tag { font-family: Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #ffffff; }
      .tag-f { fill: #2563eb; rx: 4; }
      .tag-t { fill: #d97706; rx: 4; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrft); }
    </style>
    <marker id="arrft" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon fill="#64748b" points="0 0, 9 3.5, 0 7"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1000" height="400"/>

  <!-- Title -->
  <text class="h1" x="500" y="46" text-anchor="middle">Características y variable objetivo</text>
  <text class="body" x="500" y="70" text-anchor="middle">Las características son entradas del modelo. La variable objetivo es la respuesta a predecir.</text>

  <!-- Features column -->
  <rect class="feature-box" x="30" y="90" width="360" height="290" rx="12"/>
  <rect class="tag-f" x="30" y="90" width="360" height="38" rx="12"/>
  <text class="h2" x="210" y="115" text-anchor="middle" fill="white">características (Entradas)</text>
  <text class="small" x="50" y="150">Cada fila es información sobre una persona:</text>
  <text class="body" x="60" y="178">Edad: 16</text>
  <text class="body" x="60" y="200">Horas de estudio por semana: 8</text>
  <text class="body" x="60" y="222">Tasa de tareas completadas: 90%</text>
  <text class="body" x="60" y="244">Dias asistidos: 18 de 20</text>
  <text class="body" x="60" y="266">Nota previa: 74</text>
  <text class="small" x="50" y="298">Estos son los datos que el modelo puede usar</text>
  <text class="small" x="50" y="316">al predecir. Mientras más relevantes</text>
  <text class="small" x="50" y="334">sean las características, mejor aprende el modelo.</text>

  <!-- Arrow -->
  <line class="arrow" x1="394" y1="235" x2="472" y2="235"/>

  <!-- Model box -->
  <rect class="model-box" x="474" y="190" width="110" height="90" rx="12"/>
  <text class="body" x="529" y="230" text-anchor="middle" font-weight="700">modelo</text>
  <text class="small" x="529" y="253" text-anchor="middle">(patrón</text>
  <text class="small" x="529" y="268" text-anchor="middle">aprendido)</text>

  <!-- Arrow to target -->
  <line class="arrow" x1="586" y1="235" x2="602" y2="235"/>

  <!-- Target column -->
  <rect class="target-box" x="604" y="90" width="366" height="290" rx="12"/>
  <rect class="tag-t" x="604" y="90" width="366" height="38" rx="12"/>
  <text class="h2t" x="787" y="115" text-anchor="middle" fill="white">Variable objetivo (salida a predecir)</text>
  <text class="small" x="624" y="150">Este es el valor que el modelo intenta predecir:</text>
  <text class="body" x="634" y="180">Resultado final del examen: aprueba o reprueba</text>
  <text class="small" x="624" y="215">La variable objetivo no se usa durante la predicción.</text>
  <text class="small" x="624" y="235">Durante el entrenamiento, le muestra al modelo cuál</text>
  <text class="small" x="624" y="255">debió ser la respuesta correcta,</text>
  <text class="small" x="624" y="275">para que el modelo pueda ajustar y mejorar.</text>
  <text class="small" x="624" y="310">Para datos nuevos, la variable objetivo es desconocida.</text>
  <text class="small" x="624" y="330">El modelo la predice a partir de las características.</text>
</svg>
