<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="540" viewBox="0 0 1040 540" role="img" aria-labelledby="title desc">
  <title id="title">Taxonomía del workspace de Azure ML</title>
  <desc id="desc">El workspace de Azure ML es una frontera de gobernanza que contiene activos secundarios: cómputo, activos de datos, modelos, puntos de conexión y entornos.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .cardhead { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .node { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #ffffff; }
      .label { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; fill: #1f2937; }
      .desc2 { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; fill: #475569; }
      .sub { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; }
      .subt { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #0f172a; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="540"/>
  <text class="title" x="60" y="52">Taxonomía del workspace de Azure ML</text>
  <text class="subtitle" x="60" y="80">El workspace es la frontera de gobernanza — todos los activos inferiores están dentro de él</text>

  <rect class="card" x="60" y="120" width="920" height="330" rx="12"/>
  <text class="cardhead" x="84" y="156" fill="#004a99">workspace de Azure ML</text>
  <text class="desc2" x="84" y="178">Frontera de seguridad, control de acceso y gobernanza. RBAC, cuotas y linaje se aplican a todos los activos secundarios.</text>
  <line x1="84" y1="192" x2="956" y2="192" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Cómputo -->
  <rect class="card" x="84" y="210" width="160" height="210" rx="10"/>
  <rect x="84" y="210" width="160" height="46" rx="10" fill="#004a99"/>
  <text class="node" x="164" y="240" text-anchor="middle">Cómputo</text>
  <rect class="sub" x="96" y="280" width="136" height="58" rx="6"/>
  <text class="subt" x="164" y="305" text-anchor="middle">Instancia</text>
  <text class="desc2" x="164" y="324" text-anchor="middle">Estación de desarrollo</text>
  <rect class="sub" x="96" y="350" width="136" height="58" rx="6"/>
  <text class="subt" x="164" y="375" text-anchor="middle">Clúster</text>
  <text class="desc2" x="164" y="394" text-anchor="middle">Entrenamiento escalable</text>

  <!-- Activos de datos -->
  <rect class="card" x="262" y="210" width="160" height="210" rx="10"/>
  <rect x="262" y="210" width="160" height="46" rx="10" fill="#0e7490"/>
  <text class="node" x="342" y="240" text-anchor="middle">Activos de datos</text>
  <text class="label" x="278" y="290">• Datos versionados</text>
  <text class="label" x="278" y="318">• URI file / folder</text>
  <text class="label" x="278" y="346">• MLTable tables</text>
  <text class="desc2" x="278" y="378">Reproducible</text>
  <text class="desc2" x="278" y="396">entradas</text>

  <!-- Modelos -->
  <rect class="card" x="440" y="210" width="160" height="210" rx="10"/>
  <rect x="440" y="210" width="160" height="46" rx="10" fill="#b45309"/>
  <text class="node" x="520" y="240" text-anchor="middle">Modelos</text>
  <text class="label" x="456" y="290">• registro</text>
  <text class="label" x="456" y="318">• Versionados</text>
  <text class="label" x="456" y="346">• linaje</text>
  <text class="desc2" x="456" y="378">Registrados</text>
  <text class="desc2" x="456" y="396">artefactos</text>

  <!-- Endpoints -->
  <rect class="card" x="618" y="210" width="160" height="210" rx="10"/>
  <rect x="618" y="210" width="160" height="46" rx="10" fill="#15803d"/>
  <text class="node" x="698" y="240" text-anchor="middle">Endpoints</text>
  <text class="label" x="634" y="290">• en línea (tiempo real)</text>
  <text class="label" x="634" y="318">• lote</text>
  <text class="label" x="634" y="346">• Despliegues</text>
  <text class="desc2" x="634" y="378">Servicio</text>
  <text class="desc2" x="634" y="396">de servicio</text>

  <!-- Entornos -->
  <rect class="card" x="796" y="210" width="160" height="210" rx="10"/>
  <rect x="796" y="210" width="160" height="46" rx="10" fill="#64748b"/>
  <text class="node" x="876" y="240" text-anchor="middle">Entornos</text>
  <text class="label" x="812" y="290">• Imagen base</text>
  <text class="label" x="812" y="318">• Dependencias</text>
  <text class="label" x="812" y="346">• Versionados</text>
  <text class="desc2" x="812" y="378">Reutilizable</text>
  <text class="desc2" x="812" y="396">en tiempo de ejecución</text>
</svg>
